    <!-- JavaScript -->
    <script>
        /**
         * Dynamically loads the external JavaScript file after the DOM is fully loaded.
         * This ensures that the script is appended to the body and executed properly.
         */
        document.addEventListener("DOMContentLoaded", () => {
            const script = document.createElement("script"); // Create a script element
            script.src = "script.js"; // Set the source of the script
            document.body.appendChild(script); // Append the script to the body
        });
    </script>
